<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertical Brand Hero</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: radial-gradient(circle at top,
      #e9fbff 0%,
      #cfeff7 50%,
      #a6d9e6 100%);
    overflow-x: hidden;
  }

  .spacer {
    height: 120vh;
  }

  .hero {
    position: sticky;
    top: 0;
    height: 100vh;
    display: flex;
    align-items: center;
    pointer-events: none;
  }

  /* 縦組み文字 */
  .vertical-text {
    writing-mode: vertical-rl;
    font-size: 20vw;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #49b5c9;
    line-height: 1;
    margin-left: -8vw; /* はみ出させる */
    transform: translateY(0);
    will-change: transform;
  }

  /* 仮の画像枠 */
  .image-layer {
    position: absolute;
    right: 10vw;
    width: 55vw;
    max-width: 420px;
    aspect-ratio: 3 / 4;
    border-radius: 20px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.9),
      rgba(255,255,255,0.4)
    );
  }
</style>
</head>

<body>

<div class="spacer"></div>

<section class="hero">
  <div class="vertical-text" id="vtext">
    安全性第1むじなグループ
  </div>

  <div class="image-layer"></div>
</section>

<div class="spacer"></div>

<script>
  const vtext = document.getElementById("vtext");

  window.addEventListener("scroll", () => {
    const max = document.body.scrollHeight - innerHeight;
    const progress = scrollY / max;
    const move = progress * 100; // 上に流す量

    vtext.style.transform =
      `translateY(-${move}vh)`;
  });
</script>

</body>
</html>
