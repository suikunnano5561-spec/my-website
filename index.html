<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    min-height:300vh;
    overflow-x:hidden;

    background:linear-gradient(
    180deg,
    #eefcff,
    #d8f3fb,
    #b7e1ec
    );
}

.marquee{
    position:absolute;
    left:20px;
    top:0;
    width:100%;
    height:300vh;
    pointer-events:none;
}

.text{
    position:absolute;

    writing-mode:vertical-rl;
    white-space:nowrap;

    font-size:18vw;
    font-weight:700;

    color:#4dbcd1;

    animation:up 20s linear infinite;
}

.text:nth-child(1){
    left:0;
    top:100vh;
}

.text:nth-child(2){
    left:0;
    top:220vh;
}

@keyframes up{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(-220vh);
    }
}
</style>
</head>
<body>

<div class="marquee">

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

</div>

<div style="height:300vh;"></div>

</body>
</html>
