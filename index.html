<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hero Scroll</title>

<style>
  body {
    margin: 0;
    background: #f7f7f7;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    overflow-x: hidden;
  }

  /* 画面全体のヒーロー */
  .hero {
    height: 100vh;
    display: flex;
    align-items: center;
    overflow: hidden;
    position: relative;
  }

  /* 横に流れるトラック */
  .track {
    display: flex;
    white-space: nowrap;
    animation: slide 60s linear infinite;
  }

  /* テキストブロック */
  .block {
    display: flex;
    align-items: center;
    padding-right: 8vw;
  }

  /* メインコピー */
  .main-text {
    font-size: 18vw;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #4fb3c8;
    line-height: 1;
  }

  /* サブコピー */
  .sub-text {
    font-size: 4vw;
    margin-left: 2vw;
    color: #666;
    letter-spacing: 0.2em;
    white-space: nowrap;
  }

  /* アニメーション */
  @keyframes slide {
    from {
      transform: translateX(0);
    }
    to {
      transform: translateX(-50%);
    }
  }

  /* スマホ対応 */
  @media (max-width: 768px) {
    .main-text {
      font-size: 26vw;
    }
    .sub-text {
      font-size: 6vw;
      margin-left: 3vw;
    }
  }
</style>
</head>

<body>

<section class="hero">
  <div class="track">

    <div class="block">
      <div class="main-text">安全性を第1に</div>
      <div class="sub-text">むじなグループ</div>
    </div>

    <div class="block">
      <div class="main-text">安全性を第1に</div>
      <div class="sub-text">むじなグループ</div>
    </div>

    <div class="block">
      <div class="main-text">安全性を第1に</div>
      <div class="sub-text">むじなグループ</div>
    </div>

  </div>
</section>

</body>
</html>
