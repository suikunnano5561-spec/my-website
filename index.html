<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vertical Brand Scroll</title>

<style>
  body {
    margin: 0;
    height: 300vh; /* ← スクロール量を確保 */
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: linear-gradient(
      180deg,
      #e9fbff 0%,
      #cfeff7 40%,
      #a6d9e6 100%
    );
    overflow-x: hidden;
  }

  /* 縦文字 */
  .vertical-text {
    position: fixed;
    left: -6vw;
    writing-mode: vertical-rl;
    font-size: 22vw;
    font-weight: 700;
    letter-spacing: 0.15em;
    color: #49b5c9;
    line-height: 1;
    pointer-events: none;
    transform: translateY(120vh);
    will-change: transform;
  }

  /* 仮の画像（あとで差し替え） */
  .image-layer {
    position: fixed;
    right: 8vw;
    top: 50%;
    transform: translateY(-50%);
    width: 55vw;
    max-width: 420px;
    aspect-ratio: 3 / 4;
    border-radius: 20px;
    background: linear-gradient(
      135deg,
      rgba(255,255,255,0.9),
      rgba(255,255,255,0.4)
    );
  }
</style>
</head>

<body>

<div class="vertical-text" id="vtext">
  安全性第1むじなグループ
</div>

<div class="image-layer"></div>

<script>
  const vtext = document.getElementById("vtext");

  window.addEventListener("scroll", () => {
    const scrollMax =
      document.body.scrollHeight - window.innerHeight;
    const progress = window.scrollY / scrollMax;

    const start = 120;  // 画面下スタート
    const end = -180;   // 画面上に抜ける
    const y = start + (end - start) * progress;

    vtext.style.transform = `translateY(${y}vh)`;
  });
</script>

</body>
</html>
