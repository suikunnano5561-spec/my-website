<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>むじなグループ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:500vh;
    overflow-x:hidden;
    font-family:sans-serif;
}

/* 背景動画 */
#bg-video{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-3;
}

/* 水色フィルター */
.overlay{
    position:fixed;
    inset:0;

    background:rgba(160,220,235,0.15);

    z-index:-2;
}

/* 流れるエリア */
.marquee{
    position:absolute;
    top:0;
    left:0;

    width:100%;
    height:500vh;

    pointer-events:none;
}

.text{

    position:absolute;

    left:12px;

    writing-mode:vertical-rl;

    white-space:nowrap;

    font-size:14vw;

    font-weight:700;

    color:rgba(255,255,255,0.92);

    text-shadow:
        0 0 10px rgba(0,0,0,.25),
        0 0 40px rgba(255,255,255,.4);

    animation:floatUp 26s linear infinite;
}

/* 3本配置 */
.text:nth-child(1){
    top:100vh;
}

.text:nth-child(2){
    top:260vh;
}

.text:nth-child(3){
    top:420vh;
}

/* 上へ流れる */
@keyframes floatUp{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-520vh);
    }

}

</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    805983194.841036.mp4
</video>

<div class="overlay"></div>

<div class="marquee">

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

</div>

</body>
</html>
