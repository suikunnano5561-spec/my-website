<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Scrolling Hero</title>

  <style>
    body {
      margin: 0;
      background: #f3f3f3;
      overflow-x: hidden;
      font-family: Arial, sans-serif;
    }

    /* 画面全体 */
    .hero {
      height: 100vh;
      display: flex;
      align-items: center;
      position: relative;
      overflow: hidden;
    }

    /* 流れるエリア */
    .scroll-wrapper {
      display: flex;
      white-space: nowrap;
      animation: scroll-left 25s linear infinite;
    }

    /* 巨大文字 */
    .scroll-text {
      font-size: 18vw;
      font-weight: 900;
      color: #56b6c2;
      padding-right: 5vw;
    }

    /* 左へ流すアニメーション */
    @keyframes scroll-left {
      0% {
        transform: translateX(0%);
      }
      100% {
        transform: translateX(-50%);
      }
    }

    /* スマホ調整 */
    @media (max-width: 600px) {
      .scroll-text {
        font-size: 24vw;
      }
    }
  </style>
</head>

<body>

  <section class="hero">
    <div class="scroll-wrapper">
      <div class="scroll-text">SAMPLE TEXT</div>
      <div class="scroll-text">SAMPLE TEXT</div>
      <div class="scroll-text">SAMPLE TEXT</div>
      <div class="scroll-text">SAMPLE TEXT</div>
    </div>
  </section>

</body>
</html>
