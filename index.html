<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>むじなグループ</title>

<style>

body{
    margin:0;
    min-height:500vh;
    overflow-x:hidden;

    background:linear-gradient(
        180deg,
        #eefcff 0%,
        #d8f3fb 50%,
        #b7e1ec 100%
    );
}

.marquee{
    position:absolute;
    inset:0;
    pointer-events:none;
}

.text{
    position:absolute;

    left:20px;

    writing-mode:vertical-rl;
    white-space:nowrap;

    font-size:15vw;
    font-weight:700;

    color:rgba(77,188,209,.85);

    text-shadow:0 0 20px rgba(255,255,255,.5);

    animation:up 28s linear infinite;
}

/* 1本目 */
.text:nth-child(1){
    top:100vh;
}

/* 2本目 */
.text:nth-child(2){
    top:280vh;
}

/* 3本目 */
.text:nth-child(3){
    top:460vh;
}

@keyframes up{
    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-520vh);
    }
}

</style>
</head>

<body>

<div class="marquee">

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

</div>

</body>
</html>
