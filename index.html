<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>むじなグループ</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    min-height:500vh;
    overflow-x:hidden;
}

/* 背景動画 */
#bg-video{
    position:fixed;
    top:0;
    left:0;

    width:100%;
    height:100%;

    object-fit:cover;

    z-index:-2;
}

/* 薄い水色フィルター */
.overlay{
    position:fixed;
    inset:0;

    background:rgba(180,230,240,0.18);

    z-index:-1;
}

/* 流れる文字エリア */
.marquee{
    position:absolute;
    inset:0;
    pointer-events:none;
}

.text{
    position:absolute;

    left:15px;

    writing-mode:vertical-rl;

    white-space:nowrap;

    font-size:15vw;

    font-weight:700;

    color:rgba(255,255,255,0.9);

    text-shadow:
        0 0 20px rgba(0,0,0,0.25),
        0 0 40px rgba(255,255,255,0.3);

    animation:up 28s linear infinite;
}

.text:nth-child(1){
    top:100vh;
}

.text:nth-child(2){
    top:280vh;
}

.text:nth-child(3){
    top:460vh;
}

/* 上へ流れる */
@keyframes up{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-520vh);
    }

}

</style>
</head>
<body>

<video autoplay muted loop playsinline id="bg-video">
    805983194.841036.mp4
</video>

<div class="overlay"></div>

<div class="marquee">

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

    <div class="text">
        安全性第1むじなグループ
    </div>

</div>

</body>
</html>
