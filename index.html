<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>むじなグループ</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    height:500vh;
    overflow-x:hidden;
    background:#dff7ff;
    font-family:"Yu Gothic",sans-serif;
}

/* 背景 */
.bg{
    position:fixed;
    inset:0;
    background:url("background.jpg") center/cover no-repeat;
    z-index:-2;
}

/* 白いフィルター */
.overlay{
    position:fixed;
    inset:0;
    background:rgba(255,255,255,.18);
    backdrop-filter:blur(2px);
    z-index:-1;
}

/* 縦文字 */
.brand{
    position:fixed;
    left:-5vw;
    top:110vh;

    writing-mode:vertical-rl;

    font-size:18vw;
    font-weight:900;
    color:#33a8c8;

    letter-spacing:.15em;
    line-height:1;

    opacity:.18;

    user-select:none;
    pointer-events:none;

    transition:transform .05s linear;
}

/* メイン画像 */
.main-image{
    position:fixed;
    right:8vw;
    top:50%;
    transform:translateY(-50%);
    width:min(34vw,430px);

    border-radius:20px;
    overflow:hidden;

    box-shadow:0 30px 60px rgba(0,0,0,.25);
}

.main-image img{
    width:100%;
    display:block;
}
</style>
</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="brand" id="brand">
安全性第1
むじなグループ
</div>

<div class="main-image" id="image">
<img src="logo.png">
</div>

<script>

const brand=document.getElementById("brand");
const image=document.getElementById("image");

window.addEventListener("scroll",()=>{

const max=document.body.scrollHeight-innerHeight;
const p=scrollY/max;

//縦文字
const y=110-220*p;
brand.style.transform=`translateY(${y}vh)`;

//画像
image.style.transform=
`translateY(calc(-50% + ${p*80}px))`;

});

</script>

</body>
</html>
