<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
    margin:0;
    overflow:hidden;
    height:100vh;

    background:linear-gradient(
    180deg,
    #eefcff 0%,
    #d7f3fa 50%,
    #b7e1ec 100%);
}

.text{

    position:absolute;

    left:20px;

    bottom:-120vh;

    writing-mode:vertical-rl;

    white-space:nowrap;

    font-size:22vw;

    font-weight:700;

    color:#49b8cf;

    letter-spacing:0.04em;

    animation:floatUp 20s linear infinite;
}

@keyframes floatUp{

    from{
        transform:translateY(0);
    }

    to{
        transform:translateY(-240vh);
    }

}
</style>
</head>

<body>
