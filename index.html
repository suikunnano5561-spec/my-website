<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scroll Hero</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: #fafafa;
  }

  /* スクロール用の長いエリア */
  .spacer {
    height: 200vh;
  }

  /* ヒーロー固定エリア */
  .hero {
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
    display: flex;
    align-items: center;
    background: #fafafa;
  }

  .track {
    display: flex;
    white-space: nowrap;
    transition: transform 0.1s linear;
  }

  .block {
    display: flex;
    align-items: center;
    padding-right: 10vw;
  }

  .main {
    font-size: 18vw;
    font-weight: 700;
    letter-spacing: 0.08em;
    color: #4fb3c8;
    line-height: 1;
  }

  .sub {
    font-size: 4vw;
    margin-left: 2vw;
    color: #666;
    letter-spacing: 0.2em;
    white-space: nowrap;
  }

  @media (max-width: 768px) {
    .main { font-size: 26vw; }
    .sub  { font-size: 6vw; }
  }
</style>
</head>

<body>

<div class="spacer"></div>

<section class="hero">
  <div class="track" id="track">
    <div class="block">
      <div class="main">安全性を第1に</div>
      <div class="sub">むじなグループ</div>
    </div>
    <div class="block">
      <div class="main">安全性を第1に</div>
      <div class="sub">むじなグループ</div>
    </div>
    <div class="block">
      <div class="main">安全性を第1に</div>
      <div class="sub">むじなグループ</div>
    </div>
  </div>
</section>

<div class="spacer"></div>

<script>
  const track = document.getElementById("track");

  window.addEventListener("scroll", () => {
    const scrollY = window.scrollY;
    const maxScroll = document.body.scrollHeight - window.innerHeight;

    const progress = scrollY / maxScroll;
    const move = progress * 50; // ← 横移動量（調整OK）

    track.style.transform = `translateX(-${move}%)`;
  });
</script>

</body>
</html>
